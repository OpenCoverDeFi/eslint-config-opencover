name: Changeset Bot

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  add-changeset:
    if: ${{ startsWith(github.head_ref, 'dependabot/') }}
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: 📥 Install deps
        run: pnpm install --frozen-lockfile

      - name: 🦋 Check if changeset already exists
        id: check
        run: |
          if pnpm changeset status 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 🦋 Add changeset for dependency update
        if: steps.check.outputs.exists == 'false'
        run: |
          CHANGESET_FILE=".changeset/dep-update-$(echo '${{ github.head_ref }}' | sed 's/[^a-zA-Z0-9]/-/g' | head -c 50).md"
          cat > "$CHANGESET_FILE" << 'CHANGESET'
          ---
          'eslint-config-opencover': minor
          ---

          Update dependencies.
          CHANGESET
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$CHANGESET_FILE"
          git commit -m "chore: add changeset for dependency update"
          git push
