name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened] # Trigger workflow on PR creation, reopening and when a commit is pushed.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0

      - name: ⎔ Setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: 📥 Install deps
        run: pnpm install --frozen-lockfile

      - name: 💊 Run linting
        run: pnpm lint

      - name: 🧪 Run typecheck
        run: pnpm typecheck

      - name: 📝 Run knip
        run: pnpm knip

      - name: 🧪 Run test script
        run: pnpm test
        env:
          # Prevent typescript-eslint from inferring a singleRun on CI to create an isolated TS program with default TS config breaking some tests,
          # see https://github.com/typescript-eslint/typescript-eslint/blob/main/packages/typescript-estree/src/parseSettings/inferSingleRun.ts#L36
          TSESTREE_SINGLE_RUN: false

      - name: 🦋 Run changeset check
        if: ${{ !startsWith(github.head_ref, 'renovate/') && !startsWith(github.head_ref, 'dependabot/') }}
        run: pnpm changeset status
