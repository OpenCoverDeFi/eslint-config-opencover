name: CI

on:
  pull_request:
    types: [opened, synchronize] # Trigger workflow on PR creation and when a commit is pushed.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4

      - name: ⎔ Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: 📥 Install deps
        run: pnpm install --frozen-lockfile

      - name: Patch prefer-nullish-coalescing.js with debug logs
        shell: bash
        run: |
          set -euo pipefail

          file="$(find . -name 'prefer-nullish-coalescing.js' -exec grep -l 'const isStrictNullChecks = ' {} + | head -n 1)"
          echo "Patching: $file"

          tmp="$(mktemp)"
          awk '
            { print }
            /const isStrictNullChecks = / {
              print "console.log(\"compilerOptions = \", compilerOptions);"
              print "console.log(\"isStrictNullChecks = \", isStrictNullChecks);"
            }
          ' "$file" > "$tmp"

          mv "$tmp" "$file"

      - name: 💊 Run linting
        run: pnpm lint

      - name: 🧪 Run typecheck
        run: pnpm typecheck

      - name: 📝 Run knip
        run: pnpm knip

      - name: 🧪 Run test script
        run: pnpm test

      - name: 🦋 Run changeset check
        if: ${{ !startsWith(github.head_ref, 'renovate/') }} or ${{ startsWith(github.head_ref, 'dependabot/') }}
        run: pnpm changeset status
